<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events</title>
<style>
  :root{
    --bg:#0a0606;
    --glass:rgba(22,11,13,0.55);
    --glass-border:rgba(255,255,255,0.08);
    --text:#f4eeed;
    --text-dim:#b9aeac;
    --grey-glass:rgba(40,40,42,0.5);
    --grey-text:#8a8482;
    --accent:#ff3b54;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;
    overflow-x:hidden;
  }
  #app{min-height:100vh;display:flex;flex-direction:column;}

  .topnav{
    display:flex;justify-content:space-between;align-items:center;
    padding:22px 32px;
    position:relative;z-index:5;
  }
  .brand{
    font-weight:800;font-size:18px;letter-spacing:0.3px;
    display:flex;align-items:center;gap:8px;
  }
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}

  /* ---------- STAGE (carousel) ---------- */
  .stage{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;
    padding:20px 20px 40px;
    min-height:640px;
  }
  .glow-bg{
    position:absolute;inset:0;
    pointer-events:none;
    transition:background 1.1s ease;
    z-index:0;
  }
  .card-wrap{
    position:relative;z-index:2;
    width:380px;
    max-width:88vw;
  }
  .event-card{
    position:relative;
    border-radius:28px;
    overflow:hidden;
    border:1px solid var(--glass-border);
    background:#0d0809;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.02) inset;
    display:flex;flex-direction:column;
    height:560px;
  }
  .event-card.upcoming{filter:saturate(0.25) brightness(0.85);}
  .card-image-area{
    position:relative;
    height:300px;
    overflow:hidden;
    display:flex;align-items:flex-end;
    background:#160c0d;
  }
  .card-image-area img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .card-image-area::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(10,6,6,0) 40%, rgba(10,6,6,0.95) 100%);
  }
  .status-pill{
    position:absolute;top:16px;right:16px;z-index:3;
    font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
    padding:6px 12px;border-radius:100px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.12);
  }
  .status-pill.past{color:#ff7d8c;border-color:rgba(255,59,84,0.35);}
  .status-pill.upcoming{color:var(--grey-text);}

  .card-glass{
    flex:1;
    background:var(--glass);
    backdrop-filter:blur(18px);
    border-top:1px solid var(--glass-border);
    padding:22px 24px 26px;
    display:flex;flex-direction:column;
    gap:10px;
  }
  .event-card.upcoming .card-glass{background:var(--grey-glass);}
  .event-date{
    font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
    color:var(--accent);
  }
  .event-card.upcoming .event-date{color:var(--grey-text);}
  .event-title{
    font-size:21px;font-weight:800;line-height:1.25;letter-spacing:-0.2px;
  }
  .event-desc{
    font-size:13.5px;line-height:1.55;color:var(--text-dim);
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;
  }

  .dots{display:flex;gap:7px;margin-top:26px;z-index:2;flex-wrap:wrap;justify-content:center;max-width:80vw;}
  .dot-btn{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;cursor:pointer;transition:all .25s;padding:0;}
  .dot-btn.active{width:22px;border-radius:4px;background:var(--accent);}

  .empty-state{
    text-align:center;color:var(--text-dim);font-size:14px;z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .empty-state b{color:var(--text);font-size:17px;}

  /* ---------- ADMIN ---------- */
  .password-screen{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:20px;position:relative;z-index:2;
  }
  .password-box{
    width:340px;text-align:center;
    background:var(--glass);backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);border-radius:22px;
    padding:36px 28px;
  }
  .password-box h3{font-size:17px;font-weight:800;margin-bottom:6px;}
  .password-box p{font-size:13px;color:var(--text-dim);margin-bottom:20px;}
  .err-msg{color:#ff7d8c;font-size:12.5px;margin-top:10px;min-height:14px;}

  .admin-wrap{
    max-width:760px;margin:0 auto;padding:10px 24px 80px;width:100%;
    position:relative;z-index:2;
  }
  .admin-card{
    background:var(--glass);backdrop-filter:blur(16px);
    border:1px solid var(--glass-border);border-radius:20px;
    padding:28px;margin-bottom:22px;
  }
  .admin-card h2{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--text);}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.4px;}
  .field input, .field textarea{
    width:100%;padding:12px 14px;border-radius:12px;
    border:1px solid var(--glass-border);
    background:rgba(0,0,0,0.3);color:var(--text);
    font-size:14px;font-family:inherit;
    outline:none;transition:border-color .2s;
  }
  .field input:focus, .field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:80px;}

  .upload-zone{
    border:1.5px dashed var(--glass-border);
    border-radius:14px;
    padding:18px;
    display:flex;align-items:center;gap:14px;
    cursor:pointer;
    transition:border-color .2s;
    background:rgba(0,0,0,0.2);
  }
  .upload-zone:hover{border-color:rgba(255,59,84,0.4);}
  .upload-preview{
    width:64px;height:64px;border-radius:10px;object-fit:cover;background:#1c1414;flex-shrink:0;
  }
  .upload-text{font-size:13px;color:var(--text-dim);}
  .upload-text b{color:var(--text);display:block;font-size:13.5px;margin-bottom:2px;}

  .btn{
    padding:12px 22px;border-radius:100px;border:none;cursor:pointer;
    font-size:13.5px;font-weight:700;letter-spacing:0.2px;
    transition:all .2s;
  }
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 8px 20px -6px rgba(255,59,84,0.5);}
  .btn-primary:hover{background:#ff5468;}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--glass-border);}
  .btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}

  .event-row{
    display:flex;gap:14px;align-items:center;
    padding:14px;border-radius:14px;
    border:1px solid var(--glass-border);
    margin-bottom:10px;
    background:rgba(0,0,0,0.2);
  }
  .event-row img{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#222;}
  .event-row .meta{flex:1;min-width:0;}
  .event-row .meta .t{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .event-row .meta .d{font-size:12px;color:var(--text-dim);}
  .row-actions{display:flex;gap:8px;flex-shrink:0;}
  .row-actions button{
    width:32px;height:32px;border-radius:8px;border:1px solid var(--glass-border);
    background:rgba(0,0,0,0.3);color:var(--text-dim);cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .row-actions button:hover{color:var(--text);}

  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
    background:rgba(20,10,12,0.9);backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);color:var(--text);
    padding:12px 20px;border-radius:100px;font-size:13px;font-weight:600;
    z-index:50;opacity:0;pointer-events:none;transition:opacity .3s, transform .3s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .hint{font-size:11.5px;color:var(--text-dim);margin-top:8px;}

  @media (max-width:480px){
    .topnav{padding:18px 18px;}
    .event-card{height:520px;}
    .card-image-area{height:260px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const ADMIN_PASSWORD = "shrapnel2026"; // change this to your own password
  const STORAGE_KEY = "events-list";

  let state = {
    events: [],
    activeIndex: 0,
    timerHandle: null,
    paused: false,
    authed: false,
    editingId: null,
    pendingImage: null
  };

  const app = document.getElementById("app");
  const toastEl = document.getElementById("toast");

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(()=>toastEl.classList.remove("show"), 2200);
  }
  function uid(){ return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

  async function loadEvents(){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      state.events = (res && res.value) ? JSON.parse(res.value) : [];
    }catch(e){
      state.events = [];
    }
  }
  async function saveEvents(){
    try{
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(state.events), true);
      if(!result) showToast("Couldn't save — try again");
    }catch(e){
      showToast("Couldn't save — try again");
    }
  }

  function parseDate(d){ return new Date(d + "T00:00:00"); }
  function isUpcoming(dateStr){
    const today = new Date(); today.setHours(0,0,0,0);
    return parseDate(dateStr) > today;
  }
  function formatDate(dateStr){
    return parseDate(dateStr).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function sortedEvents(){
    return [...state.events].sort((a,b)=> parseDate(a.date) - parseDate(b.date));
  }
  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s || "";
    return d.innerHTML;
  }
  function fileToDataUrl(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function resizeImage(dataUrl, maxDim){
    return new Promise((resolve)=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim/width); width = maxDim; }
          else { width = Math.round(width * maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = ()=>resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  function glowFor(ev, idx){
    if(isUpcoming(ev.date)){
      return `radial-gradient(ellipse 700px 500px at ${30+ (idx%3)*20}% 70%, rgba(90,90,95,0.22), transparent 60%)`;
    }
    const today = new Date(); today.setHours(0,0,0,0);
    const daysAgo = Math.max(0, Math.round((today - parseDate(ev.date)) / 86400000));
    const recency = Math.max(0.25, 1 - Math.min(daysAgo, 365)/365);
    const pos = 30 + (idx % 4) * 15;
    return `radial-gradient(ellipse 800px 600px at ${pos}% 65%, rgba(226,30,60,${0.35*recency+0.1}), rgba(140,18,40,${0.15*recency}) 45%, transparent 70%)`;
  }

  // ---------- ROUTING ----------
  function isAdminRoute(){
    return window.location.hash === '#admin';
  }

  function render(){
    if(isAdminRoute()){
      stopTimer();
      if(!state.authed) renderLogin();
      else renderDashboard();
    } else {
      renderCarousel();
    }
  }

  window.addEventListener('hashchange', ()=>{
    state.editingId = null;
    state.pendingImage = null;
    render();
  });

  // ---------- PUBLIC CAROUSEL ----------
  function renderCarousel(){
    const events = sortedEvents();
    const glowBg = events.length ? glowFor(events[state.activeIndex], state.activeIndex) : "radial-gradient(ellipse 800px 600px at 50% 60%, rgba(140,18,40,0.18), transparent 70%)";

    let cardHtml = "";
    if(events.length === 0){
      cardHtml = `
        <div class="empty-state">
          <b>No events yet</b>
          <span>Check back soon.</span>
        </div>`;
    } else {
      const ev = events[state.activeIndex];
      const upcoming = isUpcoming(ev.date);
      const img = ev.image || "";
      cardHtml = `
        <div class="card-wrap">
          <div class="event-card ${upcoming ? 'upcoming':''}">
            <div class="card-image-area">
              ${img ? `<img src="${img}" alt="" onerror="this.style.opacity=0">` : ``}
              <span class="status-pill ${upcoming?'upcoming':'past'}">${upcoming ? 'Upcoming' : 'Past event'}</span>
            </div>
            <div class="card-glass">
              <div class="event-date">${escapeHtml(formatDate(ev.date))}</div>
              <div class="event-title">${escapeHtml(ev.title)}</div>
              <div class="event-desc">${escapeHtml(ev.description)}</div>
            </div>
          </div>
        </div>
        <div class="dots">
          ${events.map((_,i)=>`<button class="dot-btn ${i===state.activeIndex?'active':''}" data-idx="${i}" aria-label="Go to event ${i+1}"></button>`).join('')}
        </div>
      `;
    }

    app.innerHTML = `
      <div class="glow-bg" style="background:${glowBg}"></div>
      <div class="topnav">
        <div class="brand"><span class="dot"></span> Events</div>
      </div>
      <div class="stage" id="stage">
        ${cardHtml}
      </div>
    `;

    document.querySelectorAll(".dot-btn").forEach(btn=>{
      btn.onclick = ()=>{
        state.activeIndex = parseInt(btn.dataset.idx,10);
        renderCarousel();
        resetTimer();
      };
    });
    const stage = document.getElementById("stage");
    if(stage){
      stage.onmouseenter = ()=>{ state.paused = true; };
      stage.onmouseleave = ()=>{ state.paused = false; };
    }
    startTimer();
  }

  function startTimer(){
    if(state.timerHandle) return;
    state.timerHandle = setInterval(()=>{
      if(state.paused) return;
      const events = sortedEvents();
      if(events.length < 2) return;
      state.activeIndex = (state.activeIndex + 1) % events.length;
      renderCarousel();
    }, 4500);
  }
  function stopTimer(){
    if(state.timerHandle){ clearInterval(state.timerHandle); state.timerHandle = null; }
  }
  function resetTimer(){ stopTimer(); startTimer(); }

  // refresh data periodically so new admin posts show up without a manual reload
  function refreshLoop(){
    setInterval(async ()=>{
      if(isAdminRoute()) return;
      const prevLen = state.events.length;
      const prevJson = JSON.stringify(state.events);
      await loadEvents();
      if(JSON.stringify(state.events) !== prevJson){
        if(state.activeIndex >= state.events.length) state.activeIndex = 0;
        renderCarousel();
      }
    }, 15000);
  }

  // ---------- ADMIN ----------
  function renderLogin(){
    app.innerHTML = `
      <div class="glow-bg" style="background:radial-gradient(ellipse 700px 500px at 50% 40%, rgba(140,18,40,0.2), transparent 70%)"></div>
      <div class="topnav">
        <div class="brand"><span class="dot"></span> Events Admin</div>
      </div>
      <div class="password-screen">
        <div class="password-box">
          <h3>Admin access</h3>
          <p>Enter the password to manage events.</p>
          <div class="field"><input type="password" id="pwInput" placeholder="Password" autofocus></div>
          <button class="btn btn-primary" id="pwSubmit" style="width:100%">Unlock</button>
          <div class="err-msg" id="pwErr"></div>
        </div>
      </div>
    `;
    const submit = ()=>{
      const val = document.getElementById("pwInput").value;
      if(val === ADMIN_PASSWORD){
        state.authed = true;
        render();
      } else {
        document.getElementById("pwErr").textContent = "Incorrect password";
      }
    };
    document.getElementById("pwSubmit").onclick = submit;
    document.getElementById("pwInput").onkeydown = (e)=>{ if(e.key==="Enter") submit(); };
  }

  function renderDashboard(){
    const events = sortedEvents();
    const editing = state.editingId ? state.events.find(e=>e.id===state.editingId) : null;
    const previewImg = state.pendingImage || (editing ? editing.image : null);

    app.innerHTML = `
      <div class="glow-bg" style="background:radial-gradient(ellipse 700px 500px at 50% 20%, rgba(140,18,40,0.15), transparent 70%)"></div>
      <div class="topnav">
        <div class="brand"><span class="dot"></span> Events Admin</div>
      </div>
      <div class="admin-wrap">
        <div class="admin-card">
          <h2>${editing ? 'Edit event' : 'Add new event'}</h2>

          <div class="field">
            <label>Image</label>
            <div class="upload-zone" id="uploadZone">
              ${previewImg ? `<img class="upload-preview" src="${previewImg}">` : `<div class="upload-preview"></div>`}
              <div class="upload-text">
                <b>${previewImg ? 'Change image' : 'Click to upload an image'}</b>
                JPG or PNG, resized automatically
              </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
          </div>

          <div class="field">
            <label>Event title</label>
            <input type="text" id="fTitle" placeholder="e.g. Season Launch Party" value="${editing ? escapeHtml(editing.title) : ''}">
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="fDate" value="${editing ? editing.date : ''}">
          </div>
          <div class="field">
            <label>Details</label>
            <textarea id="fDesc" placeholder="Short description of the event...">${editing ? escapeHtml(editing.description) : ''}</textarea>
          </div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" id="saveBtn">${editing ? 'Save changes' : 'Add event'}</button>
            ${editing ? `<button class="btn btn-ghost" id="cancelEdit">Cancel</button>` : ''}
          </div>
        </div>

        <div class="admin-card">
          <h2>All events (${events.length})</h2>
          ${events.length === 0 ? `<div style="color:var(--text-dim);font-size:13px;">No events yet — add your first one above.</div>` : events.map(ev=>{
            const upcoming = isUpcoming(ev.date);
            return `
            <div class="event-row">
              ${ev.image ? `<img src="${ev.image}" alt="">` : `<div style="width:56px;height:56px;border-radius:10px;background:#1c1414;flex-shrink:0;"></div>`}
              <div class="meta">
                <div class="t">${escapeHtml(ev.title)} ${upcoming ? '<span style="color:var(--grey-text);font-size:11px;font-weight:600;">· upcoming</span>' : ''}</div>
                <div class="d">${escapeHtml(formatDate(ev.date))}</div>
              </div>
              <div class="row-actions">
                <button data-edit="${ev.id}" title="Edit">✎</button>
                <button data-del="${ev.id}" title="Delete">🗑</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;

    const uploadZone = document.getElementById("uploadZone");
    const fileInput = document.getElementById("fileInput");
    uploadZone.onclick = ()=>fileInput.click();
    fileInput.onchange = async ()=>{
      const file = fileInput.files[0];
      if(!file) return;
      showToast("Processing image…");
      const rawDataUrl = await fileToDataUrl(file);
      const resized = await resizeImage(rawDataUrl, 900);
      state.pendingImage = resized;
      renderDashboard();
    };

    document.getElementById("saveBtn").onclick = async ()=>{
      const title = document.getElementById("fTitle").value.trim();
      const date = document.getElementById("fDate").value;
      const description = document.getElementById("fDesc").value.trim();
      const image = state.pendingImage || (editing ? editing.image : "");

      if(!title || !date){
        showToast("Title and date are required");
        return;
      }

      const saveBtn = document.getElementById("saveBtn");
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving…";

      if(editing){
        editing.title = title; editing.date = date; editing.image = image; editing.description = description;
      } else {
        state.events.push({ id: uid(), title, date, image, description });
      }
      await saveEvents();
      state.editingId = null;
      state.pendingImage = null;
      showToast(editing ? "Event updated" : "Event added");
      renderDashboard();
    };

    if(editing){
      document.getElementById("cancelEdit").onclick = ()=>{
        state.editingId = null;
        state.pendingImage = null;
        renderDashboard();
      };
    }
    document.querySelectorAll("[data-edit]").forEach(btn=>{
      btn.onclick = ()=>{
        state.editingId = btn.dataset.edit;
        state.pendingImage = null;
        renderDashboard();
        window.scrollTo({top:0, behavior:'smooth'});
      };
    });
    document.querySelectorAll("[data-del]").forEach(btn=>{
      btn.onclick = async ()=>{
        if(!confirm("Delete this event? This can't be undone.")) return;
        state.events = state.events.filter(e=>e.id !== btn.dataset.del);
        await saveEvents();
        showToast("Event deleted");
        renderDashboard();
      };
    });
  }

  // ---------- INIT ----------
  async function init(){
    app.innerHTML = `<div class="stage"><div class="empty-state">Loading…</div></div>`;
    await loadEvents();
    render();
    refreshLoop();
  }

  init();
})();
</script>
</body>
</html>
